name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: cronagent_root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run pytest -q
        env:
          TEST_MYSQL_HOST: 127.0.0.1
          TEST_MYSQL_PORT: "3306"
          TEST_MYSQL_USER: root
          TEST_MYSQL_PASSWORD: cronagent_root
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd src/agento/toolbox && npm ci && npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build --no-sources
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  attach-assets:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  smoke-test:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v4
      - run: |
          uv venv /tmp/smoke
          source /tmp/smoke/bin/activate
          VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          installed=false
          for i in $(seq 1 20); do
            uv pip install "agento-core==${VERSION}" && installed=true && break
            echo "PyPI not ready yet, retrying in 30s... (attempt $i/20)"
            sleep 30
          done
          $installed || { echo "Package not available on PyPI after 10 minutes"; exit 1; }
          agento --help
