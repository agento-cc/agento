name: Bug Report
description: Report a bug in Agento
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker Compose
        - Local Development
        - pip install
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Agento version (check pyproject.toml)"
    validations:
      required: false
