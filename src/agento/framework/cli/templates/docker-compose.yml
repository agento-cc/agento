name: agento

services:
  sandbox:
    image: ghcr.io/agento-cc/agento-sandbox:${AGENTO_VERSION:-latest}
    volumes:
      - ../workspace:/workspace
      - ../app/code:/app/code:ro
      - ../app/etc:/app/etc
      - ../logs:/app/logs
    environment:
      - TZ=${TZ:-UTC}
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    networks:
      - agento-net
    depends_on:
      toolbox:
        condition: service_started
    restart: unless-stopped

  toolbox:
    image: ghcr.io/agento-cc/agento-toolbox:${AGENTO_VERSION:-latest}
    environment:
      - TZ=${TZ:-UTC}
      - CRONDB_HOST=mysql
      - CRONDB_PORT=3306
      - CRONDB_DATABASE=cron_agent
      - CRONDB_USER=cron_agent
      - CRONDB_PASSWORD=${MYSQL_PASSWORD:-cronagent_pass}
    env_file:
      - path: ../secrets.env
        required: false
    volumes:
      - ../app/code:/app/modules/user:ro
      - ../logs:/app/logs
      - ../workspace/artifacts:/workspace/artifacts
    security_opt:
      - no-new-privileges:true
    networks:
      - agento-net
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  cron:
    image: ghcr.io/agento-cc/agento-cron:${AGENTO_VERSION:-latest}
    env_file:
      - path: ../secrets.env
        required: false
    environment:
      - TZ=${TZ:-UTC}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=cron_agent
      - MYSQL_USER=cron_agent
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-cronagent_pass}
      - DISABLE_LLM=${DISABLE_LLM:-0}
    volumes:
      - ../workspace:/workspace
      - ../app/code:/app/code:ro
      - ../app/etc:/app/etc
      - ../logs:/app/logs
    networks:
      - agento-net
    depends_on:
      toolbox:
        condition: service_started
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cronagent_root}
      MYSQL_DATABASE: cron_agent
      MYSQL_USER: cron_agent
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cronagent_pass}
    volumes:
      - ../storage/mysql:/var/lib/mysql
      - ../docker/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agento-net
    restart: unless-stopped

networks:
