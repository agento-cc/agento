# AUTO-GENERATED by Agento. DO NOT EDIT — this file is overwritten on upgrade.
# To customize, create docker-compose.override.yml (see docs/deployment/docker-compose-override.md).

name: agento

services:
  sandbox:
    build:
      context: ../.agento/docker/sandbox
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: agento-sandbox:${AGENTO_VERSION:-latest}
    volumes:
      - ../workspace:/workspace
      - ../app/code:/app/code:ro
      - ../app/etc:/app/etc
      - ../logs:/app/logs
      - ../.venv/lib/python{{ python_version }}/site-packages/agento:/opt/agento-src/agento:ro
      # {{ extension_mounts_sandbox }}
    environment:
      - PYTHONPATH=/opt/agento-src
      - TZ=${TZ:-UTC}
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    networks:
      - agento-net
    depends_on:
      toolbox:
        condition: service_started
    restart: unless-stopped

  toolbox:
    build:
      context: ../.agento/docker/toolbox
    image: agento-toolbox:${AGENTO_VERSION:-latest}
    environment:
      - TZ=${TZ:-UTC}
      - CRONDB_HOST=mysql
      - CRONDB_PORT=3306
      - CRONDB_DATABASE=cron_agent
      - CRONDB_USER=cron_agent
      - CRONDB_PASSWORD=${MYSQL_PASSWORD:-cronagent_pass}
    env_file:
      - path: ../secrets.env
        required: false
    volumes:
      - ../app/code:/app/modules/user:ro
      - ../logs:/app/logs
      - ../workspace/artifacts:/workspace/artifacts
      - ../.venv/lib/python{{ python_version }}/site-packages/agento/toolbox:/opt/agento-toolbox-src:ro
      - ../.venv/lib/python{{ python_version }}/site-packages/agento/modules:/app/modules/core:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - agento-net
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  cron:
    build:
      context: ../.agento/docker/cron
      args:
        SANDBOX_IMAGE: agento-sandbox:${AGENTO_VERSION:-latest}
    image: agento-cron:${AGENTO_VERSION:-latest}
    env_file:
      - path: ../secrets.env
        required: false
    environment:
      - TZ=${TZ:-UTC}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=cron_agent
      - MYSQL_USER=cron_agent
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-cronagent_pass}
      - DISABLE_LLM=${DISABLE_LLM:-0}
      - PYTHONPATH=/opt/agento-src
    volumes:
      - ../workspace:/workspace
      - ../app/code:/app/code:ro
      - ../app/etc:/app/etc
      - ../logs:/app/logs
      - ../.venv/lib/python{{ python_version }}/site-packages/agento:/opt/agento-src/agento:ro
      # {{ extension_mounts_cron }}
    networks:
      - agento-net
    depends_on:
      toolbox:
        condition: service_started
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cronagent_root}
      MYSQL_DATABASE: cron_agent
      MYSQL_USER: cron_agent
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cronagent_pass}
    volumes:
      - ../storage/mysql:/var/lib/mysql
      - ../docker/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agento-net
    restart: unless-stopped

networks:
  agento-net:
    driver: bridge
